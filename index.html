<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#faf8f5" />
  <meta name="description" content="Chef Coach — apprendre les techniques de cuisine, pratiquer une recette par semaine et progresser pas à pas." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Chef Coach" />
  <title>Chef Coach</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="app.css?v=16" />
</head>
<body>
  <div id="app">
    <main class="boot-error" aria-live="polite">
      <div class="boot-error-card">
        <div class="boot-error-icon">🍳</div>
        <h1>Chargement de Chef Coach</h1>
        <p>L’application démarre. Si ce message reste affiché, ouvre <a href="debug.html">le diagnostic</a>.</p>
      </div>
    </main>
  </div>
  <script>
    window.CHEF_COACH_BUILD = 'v16-lot-a-split-files';
    window.addEventListener('error', function (event) {
      var root = document.getElementById('app');
      if (!root) return;
      root.innerHTML = '<main class="boot-error"><div class="boot-error-card"><div class="boot-error-icon">⚠️</div><h1>Erreur de chargement</h1><p>' +
        String(event.message || 'Un fichier JavaScript ne se charge pas correctement.') +
        '</p><p class="t-small t-muted">Ouvre debug.html pour vérifier les fichiers.</p><button type="button" onclick="location.reload()">Recharger</button></div></main>';
    });
  </script>
  <script src="content/data.js?v=16"></script>
  <script src="js/state.js?v=16"></script>
  <script src="js/app.js?v=16"></script>
</body>
</html>
