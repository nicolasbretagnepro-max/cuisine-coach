<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Réinitialiser Chef Coach</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#faf8f5;color:#1a1a2e;margin:0;padding:24px;line-height:1.5}
    main{max-width:520px;margin:40px auto;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:24px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    h1{font-size:24px;margin:0 0 8px}p{color:#555}button,a{display:inline-flex;align-items:center;justify-content:center;height:44px;padding:0 16px;border-radius:14px;border:0;font-weight:700;text-decoration:none;margin-top:8px;margin-right:8px}button{background:#e85d04;color:#fff}a{background:#f3f0eb;color:#1a1a2e}
    code{background:#f3f0eb;padding:2px 5px;border-radius:6px}
  </style>
</head>
<body>
  <main>
    <h1>Réinitialiser le cache</h1>
    <p>Cette action supprime les caches et désactive l’ancien service worker. Elle ne supprime pas ta progression enregistrée dans le navigateur.</p>
    <button id="reset">Vider le cache</button>
    <a href="./">Ouvrir Chef Coach</a>
    <p id="status"></p>
  </main>
  <script>
    document.getElementById('reset').addEventListener('click', async function () {
      const status = document.getElementById('status');
      status.textContent = 'Nettoyage en cours…';
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(reg => reg.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }
        status.textContent = 'Cache vidé. Tu peux rouvrir l’application.';
      } catch (e) {
        status.textContent = 'Erreur pendant le nettoyage : ' + e.message;
      }
    });
  </script>
</body>
</html>
