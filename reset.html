<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Réinitialisation Chef Coach</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:#faf8f5;color:#1a1a2e;margin:0;min-height:100dvh;display:grid;place-items:center;padding:24px}
    main{max-width:420px;background:white;border:1px solid rgba(0,0,0,.08);border-radius:24px;padding:22px;box-shadow:0 12px 40px rgba(0,0,0,.10)}
    h1{font-size:22px;margin:0 0 10px}p{line-height:1.5;color:#555}a,button{display:inline-flex;align-items:center;justify-content:center;height:46px;padding:0 18px;border-radius:14px;background:#e85d04;color:white;text-decoration:none;font-weight:700;border:0;font:inherit;cursor:pointer}.muted{font-size:13px;color:#777}
  </style>
</head>
<body>
  <main>
    <h1>Réinitialisation de l’app</h1>
    <p id="status">Nettoyage du cache et du service worker en cours…</p>
    <p class="muted">La progression locale n’est pas supprimée.</p>
    <p><a id="go" href="./?v=15" style="display:none">Ouvrir Chef Coach</a></p>
  </main>
  <script>
    (async function(){
      var status = document.getElementById('status');
      try {
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(function(r){ return r.unregister(); }));
        }
        if ('caches' in window) {
          var keys = await caches.keys();
          await Promise.all(keys.map(function(k){ return caches.delete(k); }));
        }
        status.textContent = 'Cache nettoyé. Ouvre maintenant la version corrigée.';
      } catch(e) {
        status.textContent = 'Nettoyage partiel. Ouvre quand même la version corrigée.';
      }
      document.getElementById('go').style.display = 'inline-flex';
    })();
  </script>
</body>
</html>
